<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="oscuro.css">
</head>
<body>
    <div class="legend-card">
        <div class="legend-header">
            <div class="legend-title">La Bola de Fuego <span><i class="fas fa-fire"></i> Alma en llamas</span></div>
        </div>
        <div class="legend-body">
            <img src="boladefuego.jpg" alt="La Bola de Fuego" class="legend-img">
            <div class="legend-story">
                <p>Una esfera ígnea que persigue a los viajeros por los páramos. Se dice que es el alma en pena de alguien que murió sin confesar sus pecados, rodando por el campo.</p>
            </div>
            <div class="quote-myth"><i class="fas fa-fire-alt"></i> “Enfréntala con una oración o te llevará al abismo.”</div>
        </div>
    </div>
</body>
