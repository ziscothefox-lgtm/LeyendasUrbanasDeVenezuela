<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="oscuro.css">
</head>
<body>
    <div class="legend-card">
        <div class="legend-header">
            <div class="legend-title">La Llorona <span><i class="fas fa-water"></i> Lamento Eterno</span></div>
        </div>
        <div class="legend-body">
            <img src="llorona.jpg" alt="La Llorona" class="legend-img">
            <div class="legend-story">
                <p>Vaga por las orillas de los ríos clamando por sus hijos perdidos. Su llanto helado anuncia muerte o desgracias familiares a quien logre escucharla en la oscuridad.</p>
            </div>
            <div class="quote-myth"><i class="fas fa-tear"></i> “¡Ay, mis hijos! — grita en la noche. No mires atrás.”</div>
        </div>
    </div>
</body>
</html>
