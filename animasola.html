<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="oscuro.css">
</head>
<body>
    <div class="legend-card">
        <div class="legend-header">
            <div class="legend-title">El Ánima Sola <span><i class="fas fa-cross"></i> Alma en pena</span></div>
        </div>
        <div class="legend-body">
            <img src="animasola.jpg" alt="El Ánima Sola" class="legend-img">
            <div class="legend-story">
                <p>Un alma condenada que recorre los caminos solitarios buscando oraciones. Aparece como una figura encapuchada en las encrucijadas, envuelta en un frío sepulcral.</p>
            </div>
            <div class="quote-myth"><i class="fas fa-pray"></i> “Reza un padrenuestro: el Ánima Sola busca descanso.”</div>
        </div>
    </div>
</body>
