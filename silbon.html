<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="oscuro.css">
</head>
<body>
    <div class="legend-card">
        <div class="legend-header">
            <div class="legend-title">El Silbón <span><i class="fas fa-wind"></i> Mitos Llaneros</span></div>
        </div>
        <div class="legend-body">
            <img src="silbon.jpg" alt="El Silbón" class="legend-img">
            <div class="legend-story">
                <p>El espíritu de un joven que cargando los huesos de su padre en un costal. Su silbido agudo es un presagio mortal: si lo escuchas cerca, estás a salvo; pero si lo oyes lejano, es porque viene por ti.</p>
            </div>
            <div class="quote-myth"><i class="fas fa-music"></i> “Si oyes un silbido lejano, el Silbón ya está en tu camino.”</div>
        </div>
    </div>
</body>
</html>
