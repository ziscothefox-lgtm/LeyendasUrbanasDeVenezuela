<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="oscuro.css">
</head>
<body>
    <div class="legend-card">
        <div class="legend-header">
            <div class="legend-title">El Carretón <span><i class="fas fa-chains"></i> Carro Fantasma</span></div>
        </div>
        <div class="legend-body">
            <img src="carreton.jpg" alt="El Carretón" class="legend-img">
            <div class="legend-story">
                <p>El crujir de maderas viejas y el arrastre de cadenas anuncian su paso. Mirar este carro espectral en las noches de luna llena puede causar la locura instantánea.</p>
            </div>
            <div class="quote-myth"><i class="fas fa-ghost"></i> “Si oyes cadenas, enciérrate: el Carretón anda suelto.”</div>
        </div>
    </div>
</body>
