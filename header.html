<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* CSS INTERNO - Optimizado para Frameset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            /* Fondo Degradado Tétrico del diseño original */
            background: #0b0a0c;
            background-image: radial-gradient(circle at 50% 50%, #1e1a1f 0%, #030103 100%);
            color: #ddd8cf;
            height: 150px; /* Altura forzada del marco */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-bottom: 3px solid #3e2a2f; /* Borde separador */
            position: relative;
        }

        /* Efecto de líneas de escaneo (Scanlines) sutiles */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px);
            z-index: 1;
        }

        /* El Título Principal con Degradado Dorado Original */
        h1 {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 2.8rem; /* Tamaño imponente */
            letter-spacing: 5px;
            text-transform: uppercase;
            
            /* Degradado dorado del diseño inicial */
            background: linear-gradient(135deg, #e0cfb1 20%, #8b5a2b 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Sombra para efecto de relieve tétrico */
            text-shadow: 0 0 15px rgba(80, 30, 20, 0.6);
            z-index: 2;
            margin: 0;
        }

        /* El Subtítulo Elegante y Sutil */
        .sub {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.85rem;
            color: #aa8e6c;
            letter-spacing: 3px;
            margin-top: 10px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 15px; /* Espaciado entre iconos y texto */
            z-index: 2;
        }

        /* Íconos Tétricos (Skull y Ghost) */
        .sub i { 
            color: #6a2e2e; /* Color rojo oscuro original */
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>Ecos del Abismo</h1>
    <div class="sub">
        <i class="fas fa-skull"></i> 
        Leyendas y Mitos de Venezuela 
        <i class="fas fa-ghost"></i>
    </div>
</body>
</html>
