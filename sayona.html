<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="oscuro.css">
</head>
<body>
    <div class="legend-card">
        <div class="legend-header">
            <div class="legend-title">La Sayona <span><i class="fas fa-veil"></i> Espectro Femenino</span></div>
        </div>
        <div class="legend-body">
            <img src="sayona.jpg" alt="La Sayona" class="legend-img">
            <div class="legend-story">
                <p>Espectro de belleza fatal que castiga a los hombres infieles. Se presenta como una mujer hermosa, pero al seducir a su víctima, muestra su verdadero rostro de calavera.</p>
            </div>
            <div class="quote-myth"><i class="fas fa-female"></i> “Si una mujer de blanco toca tu puerta, no abras: es la Sayona.”</div>
        </div>
    </div>
</body>
</html>
